<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Douglas Soundboard</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 10px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .search-input {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      min-width: 220px;
    }

    .button {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #333;
      color: #eee;
      cursor: pointer;
      font-size: 12px;
    }

    .button:hover {
      background: #555;
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .tab-button {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #222;
      color: #eee;
      cursor: pointer;
      font-size: 12px;
    }

    .tab-button.active {
      background: #c0392b;
      border-color: #e74c3c;
    }

    .tab-button:hover {
      background: #444;
    }

    .content {
      border-top: 1px solid #333;
      padding-top: 8px;
    }

    .tab-content {
      display: none;
      gap: 6px;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }

    .tab-content.active {
      display: grid;
    }

    .sound-card {
      background: #181818;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sound-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sound-groups {
      font-size: 10px;
      color: #aaa;
    }

    .sound-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sound-controls .button {
      padding: 4px 6px;
      font-size: 11px;
    }

    .volume-slider {
      flex: 1;
    }

    .hint {
      font-size: 10px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>

    const GROUP_ORDER = ["All", "Haunting", "Wild", "Music", "Undead", "Combat", "Hotness"];

    const audioState = new Map(); // key: index, value: { audio, volume }

    function getOrCreateAudio(index) {
      let state = audioState.get(index);
      if (!state) {
        const audio = new Audio(sounds[index].file);
        audio.volume = 1;
        state = { audio, volume: 1 };
        audioState.set(index, state);
      }
      return state;
    }

    function playSound(index) {
      const state = getOrCreateAudio(index);
      state.audio.currentTime = 0;
      state.audio.play();
    }

    function stopSound(index) {
      const state = audioState.get(index);
      if (state) {
        state.audio.pause();
        state.audio.currentTime = 0;
      }
    }

    function setVolume(index, value) {
      const state = getOrCreateAudio(index);
      state.volume = value;
      state.audio.volume = value;
    }

    function stopAll() {
      audioState.forEach(state => {
        state.audio.pause();
        state.audio.currentTime = 0;
      });
    }

    function buildUI() {
      const tabsDiv = document.getElementById("tabs");
      const contentDiv = document.getElementById("content");

      // Determine which groups actually exist
      const groupsPresent = new Set();
      sounds.forEach(s => s.groups.forEach(g => groupsPresent.add(g)));

      const groups = GROUP_ORDER.filter(g => groupsPresent.has(g));

      // Build tabs
      tabsDiv.innerHTML = groups.map((g, i) =>
        `<button class="tab-button" data-group="${g}" onclick="showTab('${g}')" data-index="${i}">${g}</button>`
      ).join("");

      // Build content per group
      contentDiv.innerHTML = groups.map(g => {
        const groupSounds = sounds
          .map((s, idx) => ({ ...s, idx }))
          .filter(s => s.groups.includes(g));

        const cards = groupSounds.map(s => `
          <div class="sound-card" data-sound-index="${s.idx}">
            <div class="sound-title" title="${s.title}">${s.title}</div>
            <div class="sound-groups">${s.groups.join(", ")}</div>
            <div class="sound-controls">
              <button class="button" onclick="playSound(${s.idx})">Play</button>
              <button class="button" onclick="stopSound(${s.idx})">Stop</button>
              <input class="volume-slider" type="range" min="0" max="1" step="0.01"
                     value="1" oninput="setVolume(${s.idx}, parseFloat(this.value))" />
            </div>
          </div>
        `).join("");

        return `<div class="tab-content" id="tab-${g}">${cards}</div>`;
      }).join("");

      if (groups.length > 0) {
        showTab(groups[0]);
      }
    }

    function showTab(group) {
      const allTabs = document.querySelectorAll(".tab-button");
      const allContents = document.querySelectorAll(".tab-content");

      allTabs.forEach(btn => {
        btn.classList.toggle("active", btn.getAttribute("data-group") === group);
      });

      allContents.forEach(div => {
        div.classList.toggle("active", div.id === `tab-${group}`);
      });

      currentTab = group;
    }

    let currentTab = null;

    function applySearch() {
      const query = document.getElementById("search").value.trim().toLowerCase();

      const allCards = document.querySelectorAll(".sound-card");
      if (!query) {
        // Show all cards in the active tab
        allCards.forEach(card => {
          card.style.display = "";
        });
        return;
      }

      allCards.forEach(card => {
        const idx = parseInt(card.getAttribute("data-sound-index"), 10);
        const s = sounds[idx];
        const haystack = (s.title + " " + s.file + " " + s.groups.join(" ")).toLowerCase();
        card.style.display = haystack.includes(query) ? "" : "none";
      });
    }

    // Keyboard shortcuts
    document.addEventListener("keydown", (e) => {
      const activeElement = document.activeElement;
      const isTyping = activeElement && (activeElement.tagName === "INPUT" || activeElement.tagName === "TEXTAREA");

      if (e.key === "/" && !isTyping) {
        e.preventDefault();
        document.getElementById("search").focus();
        document.getElementById("search").select();
        return;
      }

      if (e.code === "Space" && !isTyping) {
        e.preventDefault();
        stopAll();
        return;
      }

      // 1тАУ6 for tabs
      if (!isTyping && e.key >= "1" && e.key <= "6") {
        const index = parseInt(e.key, 10) - 1;
        const tabs = document.querySelectorAll(".tab-button");
        if (tabs[index]) {
          const group = tabs[index].getAttribute("data-group");
          showTab(group);
        }
      }
    });

    document.getElementById("search").addEventListener("input", applySearch);

    window.onload = buildUI;
  </script>
</body>
</html>
